name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip auto-review when the trigger actor is a bot. The codex-followup
    # workflow pushes auto-fix commits as `claude[bot]`, which fires a
    # `synchronize` event here. Without this filter the Claude action's
    # anti-loop guard refuses with "Workflow initiated by non-human actor"
    # and the check shows red on the PR (mergeStateStatus=UNSTABLE). Bot-
    # authored pushes are already validated by the workflow that produced
    # them (codex-followup runs pytest + ruff + scoped mypy before pushing),
    # so a second auto-review is redundant. The `endsWith` form covers any
    # bot identity (dependabot[bot], renovate[bot], chatgpt-codex-connector[bot])
    # without enumeration. Surfaced on PR #152.
    if: ${{ !endsWith(github.actor, '[bot]') }}

    # Optional alternative filter (not active): only run for specific PR
    # authors / new contributors.
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@939ae9c056ecf8a1a01409ddd1c4eadec5f8c77b # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

