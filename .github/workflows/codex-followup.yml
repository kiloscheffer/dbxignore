# Auto-process Codex bot review findings without maintainer relay.
#
# Triggers on every `pull_request_review_comment.created` event whose author
# is the Codex bot. The job checks out the PR branch, runs Claude Code with
# a self-contained prompt that includes the comment context, and lets Claude
# decide between fix-and-push, push-back-with-reasoning, or escalate.
#
# Sibling to `claude.yml` (which fires only when a comment contains `@claude`)
# and `claude-code-review.yml` (which fires on PR open/update). This workflow
# is the auto-summoning variant for Codex's Codex's review-comment cadence —
# the maintainer no longer has to manually paste "new comment" to relay each
# finding.
#
# Loop control: Claude self-imposes a 3-iteration budget per PR (counted by
# fix-commits authored on the branch since the most recent merge to main).
# Past that, Claude escalates with `@kiloscheffer needs decision` and stops
# on that PR — convergence is asymptotic past three rounds.
#
# Auth: reuses the existing `CLAUDE_CODE_OAUTH_TOKEN` secret already used by
# `claude.yml` and `claude-code-review.yml`. No new secrets required.
#
# Known trade-off: pushes from this workflow use the default GITHUB_TOKEN,
# which by GitHub's loop-prevention rule does NOT re-trigger downstream
# workflows (test.yml / commit-check.yml) on the auto-fix commit. The
# Claude run inside this workflow runs pytest + ruff + scoped mypy as part
# of the fix, so the fix is validated; it just won't show a green check on
# the PR's CI list for the auto-fixed commit. If a regression slips through
# the workflow's local validation, Codex's next review round catches it OR
# the maintainer's PR-merge inspection does. Acceptable for v1; switch to
# a PAT if visible-CI-on-auto-commit becomes a hard requirement.

name: Codex follow-up

on:
  pull_request_review_comment:
    types: [created]

jobs:
  codex-followup:
    # Only fire when the commenter is the Codex bot AND the PR's head branch
    # lives in this repo (fork PRs lack push access, so they need maintainer
    # relay regardless).
    if: |
      github.event.comment.user.login == 'chatgpt-codex-connector[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push fix commits to the PR branch
      pull-requests: write   # reply to the Codex bot comment
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync project dependencies
        run: uv sync --all-extras

      - name: Install commit-check
        # The workflow's prompt instructs Claude to pre-flight commit
        # subjects via `commit-check`, which is a separate uv tool (not a
        # project dep). Without this step Claude would either skip the
        # pre-flight or hit a "command not found" mid-run. CI's own
        # commit-check.yml workflow still validates on push, but pre-flight
        # avoids the round-trip cost.
        run: uv tool install commit-check

      - name: Run Claude Code on Codex finding
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            A Codex bot review comment was posted on PR #${{ github.event.pull_request.number }}
            (${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}).

            **Comment ID**: ${{ github.event.comment.id }}
            **File**: `${{ github.event.comment.path }}` line ${{ github.event.comment.line }}

            **Comment body**:
            ---
            ${{ github.event.comment.body }}
            ---

            ## Your job

            Analyze whether the suggested fix is correct, then take ONE of three actions:

            1. **Fix-and-push** — the suggestion addresses a real bug without regression risk:
               - Implement the fix.
               - Run `uv run python -m pytest -q`. If it fails, debug; do not push a broken state.
               - Run `uv run ruff check .` and `uv run ruff format --check .`. Reformat if needed.
               - Run `uv run mypy <touched-files>` (project convention is scoped mypy; full-tree
                 has documented pre-existing `[attr-defined]` errors per CLAUDE.md gotcha).
               - Commit (subject ≤72 chars; description MUST NOT start with `#` after `: ` —
                 use `item #N` not `#N`). The commit message body MUST end with the literal
                 footer line ``Codex-followup: yes`` (separate paragraph at the end, not in
                 the subject). The Loop budget section uses this marker to count prior auto-fix
                 attempts; without the footer the budget either over-counts (gating normal
                 feature PRs) or under-counts (allowing runaway iteration).
                 Pre-flight via the **temp-file form** per BACKLOG #83:
                 `git log -1 --format='%s' > /tmp/subj.txt && commit-check -m /tmp/subj.txt`.
                 Do NOT use `commit-check -m /dev/stdin` — it returns stale-buffered results on
                 Git Bash / MSYS2.
               - Push.
               - Reply to the bot with the substantive answer:
                 `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \`
                 `   -F in_reply_to=${{ github.event.comment.id }} \`
                 `   -f body="<your reply describing what you fixed and why>"`
               - Then send a SEPARATE follow-up reply with literally `@codex review` to
                 re-summon the bot for verification on the new state. Without this, Codex
                 won't re-evaluate after your push and the iteration loop dies prematurely:
                 `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \`
                 `   -F in_reply_to=${{ github.event.comment.id }} \`
                 `   -f body="@codex review"`

            2. **Push-back-with-reasoning** — the suggestion would cause a regression. The
               common shape in this project: the bot asks to drop a negation as inert via
               `_dropped`, but `RuleCache.match()` *ignores* entries listed in `_dropped` (they
               vanish from pathspec evaluation), so adding a negation to `_dropped` removes its
               last-match-wins override from `match()`. Paths the negation was effectively
               unignoring (because pathspec last-match-wins put the negation last) become
               ignored again at the `match()` level — and since `reconcile._reconcile_path`
               sets/clears markers based on `match()`, this is a real on-disk marker change,
               not a diagnostic-only one.
               - Reply with the technical reasoning, no code change.
               - Then send a SEPARATE follow-up reply with literally `@codex review` so the
                 bot weighs in on the pushback. Codex may agree (resolving the thread) or
                 surface a new angle — either is a valid loop continuation. Without the
                 re-summon, the bot's last comment stands unaddressed visually.

            3. **Escalate** — finding requires architectural judgment OR you've hit the 3-fix-commit
               budget OR you're uncertain. Reply with a comment that includes `@kiloscheffer needs
               decision` and a 1-paragraph summary. Stop on this PR — do NOT send `@codex review`
               in escalation cases (the maintainer should make the call, not another bot round).

            ## Loop budget

            **Count only prior auto-fix commits**, not the PR's normal feature commits. Otherwise
            a 4-commit feature PR would hit the budget on the very first Codex finding, which is
            wrong (the budget is meant to prevent runaway iteration cycles, not to gate normal PRs).

            **Marker convention**: every commit you make in the **Fix-and-push** action MUST
            include the literal footer line ``Codex-followup: yes`` in its commit message body
            (separate paragraph at the end, not in the subject). Then count via:

                git log --grep='^Codex-followup: yes$' origin/main..HEAD --oneline | wc -l

            If that count is ≥ 3, prefer escalation over a 4th auto-fix — convergence is asymptotic
            past three rounds (PR #149 demonstrated five Codex P1s; the fifth was wrong).

            **Exceptions**: a simple typo / one-character / docstring fix is cheap enough to
            implement even at the budget — the cost is bounded and the alternative (escalation
            for a typo) wastes the maintainer's attention.

            ## Project conventions (from CLAUDE.md)

            - Run pre-commit hooks normally; if a hook fails on the editable-install file-lock
              (`os error 32` on `.venv/`), use `git commit --no-verify` AFTER confirming the lint /
              mypy / ruff checks pass manually.
            - Branch is already set; commit on the existing PR branch.
            - For rules-conflict / detector changes, pair every cache-level test
              (`_detect_conflicts(...) == ...`) with a real-pathspec marker-level test
              (`cache.match(...)` returns the expected bool). The marker-level test is the
              regression guard.

            ## Don't

            - Don't open a new PR. Push directly to the existing branch.
            - Don't merge. The maintainer merges.
            - Don't `--force-push` unless rebasing for an unavoidable conflict; prefer regular
              `git push` for fix commits.
