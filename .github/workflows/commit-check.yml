name: commit-check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    # Skip on bot-authored PRs. Dependabot opens branches named
    # `dependabot/github_actions/<group>` (and similar for other ecosystems);
    # those don't match `cchk.toml`'s `allow_branch_types`, so `branch: true`
    # below would fail every Dependabot PR. Conventional Commits validation
    # for the *commit message* is still enforced for bot PRs by Dependabot's
    # own `commit-message.prefix` config in `.github/dependabot.yml`, which
    # produces `ci(deps): bump …` subjects out of the box.
    #
    # Field choice: `github.event.pull_request.user.login`, NOT `github.actor`.
    # `github.actor` is whoever triggered the *current* workflow run — when a
    # human clicks "Update branch" on a Dependabot PR, github.actor becomes
    # the human and the filter no longer fires. `pull_request.user.login` is
    # the PR author, which stays `dependabot[bot]` regardless of who clicks
    # Update or pushes follow-up commits. Surfaced by PR #158 (the first
    # auto-Dependabot PR after #156's initial fix used the wrong field).
    # This is a different intent than `claude-code-review.yml:25` —
    # that workflow correctly uses `github.actor` because its question is
    # "did a bot push the latest commit?", not "is this a bot's PR?".
    if: ${{ !endsWith(github.event.pull_request.user.login, '[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: commit-check/commit-check-action@7c158d4541309c5952de3343151750882b036d10 # v2.6.0
        with:
          message: true
          branch: true
          job-summary: true
          pr-comments: true
