name: release

on:
  push:
    tags: ['v*']
  # Manual dispatch lets us dry-run the build without cutting a tag.
  # The publish jobs are tag-gated, so dispatch runs exercise build
  # + artifact upload but skip both publish destinations.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync deps
        run: uv sync --all-extras

      - name: Build wheel + sdist
        run: uv build

      - name: Build Windows binaries
        # pyinstaller is a build-only tool, not a runtime or dev dep — install
        # ephemerally for this run rather than declaring it in pyproject.toml.
        run: uv run --with pyinstaller pyinstaller pyinstaller/dbxignore.spec

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  build-macos:
    # arm64 Mach-O binaries built on macos-latest (which aliases to macos-14
    # / Apple Silicon). Intel users install via the universal Python wheel
    # from PyPI; an x86_64 build leg can be added in a point release if
    # demand surfaces.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync deps
        run: uv sync --all-extras

      - name: Build macOS binaries
        run: uv run --with pyinstaller pyinstaller pyinstaller/dbxignore-macos.spec

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-macos
          path: dist/
          retention-days: 1

  publish-github:
    # GitHub Release: wheel + sdist + Windows binaries + macOS binaries.
    # Runs on every tag push; both build legs must succeed first.
    needs: [build, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows + wheel artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-macos
          path: dist-macos/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/dbxignore.exe
            dist/dbxignored.exe
            dist-macos/dbxignore
            dist-macos/dbxignored
          generate_release_notes: true
          # Tags containing '-a' (alphas like v0.4.0a1) or '-rc' (release
          # candidates) are auto-marked as GitHub pre-releases. Allows the
          # v0.4 beta-test workflow to ship a downloadable artifact without
          # promoting to PyPI (which is gated on the `pypi` environment).
          prerelease: ${{ contains(github.ref, '-a') || contains(github.ref, '-rc') }}
          # When `GH_RELEASE_TOKEN` is configured as a repo secret (a PAT with
          # `contents: write` scope belonging to the repo owner), releases are
          # authored under the owner's GitHub identity. Falls back to the
          # default `github.token` (author: github-actions[bot]) when the
          # secret isn't set, so the workflow never fails because of a
          # missing secret — it just reverts to the bot-author attribution.
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}

  publish-pypi:
    # PyPI via Trusted Publishing (OIDC). Gated on the `pypi` GitHub
    # environment, which requires manual approval before the upload
    # step runs. The id-token:write permission is scoped to this job
    # only — least privilege. macOS Mach-O binaries are not shipped to
    # PyPI (only wheels/sdists), so dist-macos isn't downloaded here.
    #
    # Alpha and RC tags skip PyPI entirely (defense-in-depth on top of
    # the environment gate). Mirror of the publish-github prerelease:
    # expression, inverted: tags containing `-a` or `-rc` don't enter
    # the publish-pypi job at all, so there's no queued-publish for
    # someone to accidentally approve. The environment gate remains
    # for the release-tag path as a second safety layer.
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/')
      && !contains(github.ref, '-a')
      && !contains(github.ref, '-rc')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Exclude Windows binaries (PyPI distribution only)
        run: rm -f dist/*.exe

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
