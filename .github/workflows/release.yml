name: release

on:
  push:
    tags: ['v*']
  # Manual dispatch lets us dry-run the build without cutting a tag.
  # The publish jobs are tag-gated, so dispatch runs exercise build
  # + artifact upload but skip both publish destinations.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Sync deps
        run: uv sync --all-extras

      - name: Build wheel + sdist
        run: uv build

      - name: Build Windows binaries
        # pyinstaller is a build-only tool, not a runtime or dev dep —
        # install ephemerally for this run rather than declaring it in
        # pyproject.toml. One merged onedir spec produces dist/dbxignore/
        # containing both dbxignore.exe (console=True; CLI) and
        # dbxignorew.exe (console=False; Task Scheduler daemon + Explorer
        # shell-verb helper) plus one shared _internal/ dependency tree.
        run: uv run --with pyinstaller pyinstaller pyinstaller/dbxignore.spec

      - name: Smoke test Windows binaries
        # --help fails-fast on missing-bundled-module errors (e.g. a
        # _cffi_backend that didn't make it into the bundle). --version
        # fails-fast on missing dist-info metadata (PyInstaller surfaces
        # this as "RuntimeError: <pkg> is not installed" when
        # importlib.metadata can't find the wheel inside the bundle).
        # Both binaries live in the onedir tree dist/dbxignore/.
        shell: bash
        run: |
          set -e
          # dbxignore.exe — console subsystem; synchronous by default.
          help_out=$(./dist/dbxignore/dbxignore.exe --help 2>&1)
          echo "$help_out"
          echo "$help_out" | grep -q "Usage:"
          version_out=$(./dist/dbxignore/dbxignore.exe --version 2>&1)
          echo "$version_out"
          echo "$version_out" | grep -q "dbxignore.exe, version"
          # dbxignorew.exe — GUI subsystem; bash assignment forces wait.
          # We don't grep its output (the MessageBox path can't be
          # exercised in headless CI), but a non-zero exit surfaces an
          # import-time crash, and bash waits synchronously thanks to the
          # pipe redirection.
          ./dist/dbxignore/dbxignorew.exe --help >/dev/null 2>&1
          ./dist/dbxignore/dbxignorew.exe --version >/dev/null 2>&1
          # Both binaries and the shared dependency tree must exist.
          test -s ./dist/dbxignore/dbxignore.exe
          test -s ./dist/dbxignore/dbxignorew.exe
          test -d ./dist/dbxignore/_internal

      - name: Zip Windows onedir bundle
        # winget and the Scoop bucket consume an archive of the whole
        # onedir tree. `-Path dist/dbxignore/*` archives the directory
        # *contents* (both .exe files + _internal\) at the zip root, so
        # the extracted layout is dbxignore.exe alongside _internal\ with
        # no wrapper directory.
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/dbxignore/* `
            -DestinationPath dist/dbxignore-windows-x86_64.zip

      - name: Build Windows installer
        # Compile the Inno Setup installer. Inno Setup 6 is pre-installed
        # on the windows-latest runner image; ISCC.exe lives under
        # Program Files (x86). The version is read from the built binary's
        # --version output so tag pushes and workflow_dispatch runs both
        # get a correct AppVersion. (If a future runner image drops Inno
        # Setup, add: choco install innosetup -y)
        shell: pwsh
        run: |
          $versionLine = & dist\dbxignore\dbxignore.exe --version
          $ver = ($versionLine -replace '.*version\s+', '').Trim()
          Write-Host "Installer AppVersion: $ver"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$ver installer\dbxignore.iss

      - name: Smoke test Windows installer
        # Silent-install with the daemon task deselected
        # (/MERGETASKS=!registerdaemon — explicit deselect merged onto the
        # defaults; a bare /TASKS= is ambiguous) so the post-install
        # `dbxignore install` is skipped (the runner has no Dropbox).
        # Assert the onedir tree landed and the CLI runs, then
        # silent-uninstall and assert the install dir is gone.
        #
        # The installer and uninstaller each run under a hard timeout: a
        # hung step must fail fast — dumping tasklist and the Inno /LOG
        # for diagnosis — never block the runner indefinitely.
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dir = "$env:LOCALAPPDATA\Programs\dbxignore"
          $instLog = Join-Path $env:RUNNER_TEMP 'dbxignore-install.log'
          $uninLog = Join-Path $env:RUNNER_TEMP 'dbxignore-uninstall.log'

          function Invoke-Bounded($exe, $arglist, $timeoutSec, $label, $logPath) {
            Write-Host "==> $label : $exe $($arglist -join ' ')"
            $p = Start-Process -FilePath $exe -ArgumentList $arglist -PassThru
            if (-not $p.WaitForExit($timeoutSec * 1000)) {
              # Kill first so the process releases its Inno /LOG handle
              # before we read it, then dump diagnostics.
              try { $p.Kill($true) } catch { }
              Write-Host "::group::$label timed out after ${timeoutSec}s"
              tasklist | Select-String -Pattern 'dbxignore|unins|_iu|setup'
              if (Test-Path $logPath) { Write-Host '--- Inno log ---'; Get-Content $logPath }
              Write-Host '::endgroup::'
              throw "$label timed out after ${timeoutSec}s"
            }
            $code = try { $p.ExitCode } catch { '(unknown)' }
            Write-Host "==> $label exited with code $code"
          }

          Invoke-Bounded 'dist\dbxignore-setup.exe' `
            @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/MERGETASKS=!registerdaemon',"/LOG=$instLog") `
            120 'installer' $instLog
          foreach ($f in 'dbxignore.exe','dbxignorew.exe','_internal') {
            if (-not (Test-Path "$dir\$f")) { throw "installer did not place $f" }
          }
          & "$dir\dbxignore.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "installed dbxignore.exe --version failed" }

          $uninst = Get-ChildItem $dir -Filter 'unins*.exe' | Select-Object -First 1
          Invoke-Bounded $uninst.FullName `
            @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART',"/LOG=$uninLog") `
            120 'uninstaller' $uninLog
          $deadline = (Get-Date).AddSeconds(60)
          while ((Test-Path "$dir\dbxignore.exe") -and (Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
          }
          if (Test-Path "$dir\dbxignore.exe") {
            Write-Host '::group::uninstall did not remove the install dir'
            tasklist | Select-String -Pattern 'dbxignore|unins|_iu'
            if (Test-Path $uninLog) { Write-Host '--- Inno uninstall log ---'; Get-Content $uninLog }
            Write-Host '::endgroup::'
            throw "uninstall did not remove the install dir within 60s"
          }

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  build-macos:
    # arm64 Mach-O binaries built on macos-latest (which aliases to macos-14
    # / Apple Silicon). Intel users install via the universal Python wheel
    # from PyPI; an x86_64 build leg can be added in a point release if
    # demand surfaces.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Sync deps
        run: uv sync --all-extras

      - name: Build macOS binaries
        run: uv run --with pyinstaller pyinstaller pyinstaller/dbxignore-macos.spec

      - name: Smoke test macOS binaries
        # `--help` exercises the full import chain (cli → markers →
        # _backends/macos_xattr → xattr → cffi → _cffi_backend) without
        # starting the daemon, catching missing-bundled-module errors
        # before the artifact ships. `--version` additionally exercises
        # the `copy_metadata("dbxignore")` bundling in the .spec.
        # The onedir bundle puts the executable in dist/dbxignore/.
        shell: bash
        run: |
          set -e
          ./dist/dbxignore/dbxignore --help
          version_out=$(./dist/dbxignore/dbxignore --version 2>&1)
          echo "$version_out"
          echo "$version_out" | grep -q "dbxignore, version"
          test -d ./dist/dbxignore/_internal

      - name: Archive macOS bundle
        # tar.gz of the onedir tree. The single top-level directory is
        # dbxignore/; install.sh strips it with --strip-components=1.
        run: |
          cd dist
          tar -czf dbxignore-macos-arm64.tar.gz dbxignore

      - name: Smoke test install.sh
        # Install from the freshly-built local tarball (no release exists
        # yet on a workflow_dispatch run), with the daemon step skipped
        # (the runner has no Dropbox). Assert dbxignore runs from the
        # symlink, then uninstall and assert the install dir is gone.
        run: |
          set -e
          DBXIGNORE_INSTALL_TARBALL="$PWD/dist/dbxignore-macos-arm64.tar.gz" \
            sh install.sh --no-daemon --no-modify-path
          "$HOME/.local/bin/dbxignore" --version
          sh install.sh --uninstall
          test ! -e "$HOME/.local/share/dbxignore"
          test ! -e "$HOME/.local/bin/dbxignore"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-macos
          path: dist/dbxignore-macos-arm64.tar.gz
          retention-days: 1

  build-linux:
    # x86_64 ELF binary built on ubuntu-22.04 for wider glibc compat
    # (glibc 2.35; works on Debian 12+, Fedora 36+, RHEL 9+, Ubuntu 22.04+).
    # Users on older distros install via PyPI per the README. An aarch64
    # build leg can be added on ubuntu-22.04-arm if demand surfaces.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Sync deps
        run: uv sync --all-extras

      - name: Shellcheck install.sh
        # shellcheck is preinstalled on the ubuntu runner image. POSIX-sh
        # correctness matters for a script piped straight into `sh`.
        run: shellcheck install.sh

      - name: Build Linux binary
        run: uv run --with pyinstaller pyinstaller pyinstaller/dbxignore-linux.spec

      - name: Smoke test Linux binary
        # Same shape as the macOS smoke test: `--help` exercises the full
        # import chain (cli → markers → _backends/linux_xattr → stdlib
        # os.getxattr) without starting the daemon; `--version` exercises
        # the copy_metadata("dbxignore") bundling in the .spec.
        # The onedir bundle puts the executable in dist/dbxignore/.
        run: |
          set -e
          ./dist/dbxignore/dbxignore --help
          version_out=$(./dist/dbxignore/dbxignore --version 2>&1)
          echo "$version_out"
          echo "$version_out" | grep -q "dbxignore, version"
          test -d ./dist/dbxignore/_internal

      - name: Archive Linux binary
        # tar.gz of the onedir tree. The single top-level directory is
        # dbxignore/; install.sh strips it with --strip-components=1.
        run: |
          cd dist
          tar -czf dbxignore-linux-x86_64.tar.gz dbxignore

      - name: Smoke test install.sh
        # Install from the freshly-built local tarball, daemon step
        # skipped. Assert dbxignore runs from the symlink, then uninstall.
        run: |
          set -e
          DBXIGNORE_INSTALL_TARBALL="$PWD/dist/dbxignore-linux-x86_64.tar.gz" \
            sh install.sh --no-daemon --no-modify-path
          "$HOME/.local/bin/dbxignore" --version
          sh install.sh --uninstall
          test ! -e "$HOME/.local/share/dbxignore"
          test ! -e "$HOME/.local/bin/dbxignore"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-linux
          path: dist/dbxignore-linux-x86_64.tar.gz
          retention-days: 1

  classify-tag:
    # Parse the pushed tag against PEP 440 pre-release patterns so both
    # publish-* jobs share a single source of truth for "is this a release
    # tag or a pre-release tag?". GitHub Actions expressions don't have
    # regex, and PEP 440 doesn't use a hyphen separator (alphas are
    # `0.4.0a1`, not `0.4.0-a1`), so a `contains(github.ref, '-a')` check
    # would not fire on real pre-release tags.
    #
    # Recognized pre-release suffixes: `aN`, `bN`, `rcN`, `.devN`.
    # `.postN` (post-release) is NOT a pre-release per PEP 440 and
    # correctly classifies as a release tag.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.detect.outputs.is_prerelease }}
    steps:
      - id: detect
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" =~ (a|b|rc)[0-9]+$ ]] || [[ "$tag" =~ \.dev[0-9]+$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag → pre-release"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag → release"
          fi

  publish-github:
    # GitHub Release: Windows onedir bundle + installer + macOS + Linux
    # bundles. Wheel + sdist are not attached here — they ship to PyPI
    # (publish-pypi), which is their authoritative source.
    # Runs on every tag push; all build legs must succeed first.
    needs: [build, build-macos, build-linux, classify-tag]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows + wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-macos
          path: dist-macos/

      - name: Download Linux artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-linux
          path: dist-linux/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            dist/dbxignore-windows-x86_64.zip
            dist/dbxignore-setup.exe
            dist-macos/dbxignore-macos-arm64.tar.gz
            dist-linux/dbxignore-linux-x86_64.tar.gz
          generate_release_notes: true
          # Pre-release flag is sourced from classify-tag's PEP 440 detector
          # so it can't disagree with publish-pypi's gating below.
          prerelease: ${{ needs.classify-tag.outputs.is_prerelease == 'true' }}
          # When `GH_RELEASE_TOKEN` is configured as a repo secret (a PAT with
          # `contents: write` scope belonging to the repo owner), releases are
          # authored under the owner's GitHub identity. Falls back to the
          # default `github.token` (author: github-actions[bot]) when the
          # secret isn't set, so the workflow never fails because of a
          # missing secret — it just reverts to the bot-author attribution.
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}

  publish-pypi:
    # PyPI via Trusted Publishing (OIDC). Gated on the `pypi` GitHub
    # environment, which requires manual approval before the upload
    # step runs. The id-token:write permission is scoped to this job
    # only — least privilege. macOS Mach-O binaries are not shipped to
    # PyPI (only wheels/sdists), so dist-macos isn't downloaded here.
    #
    # PEP 440 pre-release tags skip PyPI entirely via classify-tag's
    # detector — defense-in-depth on top of the environment gate.
    # Pre-releases never enter this job, so there's no queued-publish
    # for someone to accidentally approve. The environment gate
    # remains for the release-tag path as a second safety layer.
    needs: [build, classify-tag]
    if: |
      startsWith(github.ref, 'refs/tags/')
      && needs.classify-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Exclude Windows binaries (PyPI distribution only)
        # PyPI only accepts wheels and sdists. Drop the .zip archive, the
        # onedir bundle directory, and any .exe (covers dbxignore-setup.exe
        # once a later PR adds it).
        run: rm -rf dist/*.zip dist/dbxignore dist/*.exe

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

  publish-scoop:
    # Auto-bump the kiloscheffer/scoop-dbxignore bucket manifest to the
    # newly-released version. Runs in parallel with publish-pypi after
    # publish-github (which ensures the binaries are on the release).
    # Same release-tag + non-prerelease gating as publish-pypi.
    needs: [classify-tag, publish-github]
    if: |
      startsWith(github.ref, 'refs/tags/')
      && needs.classify-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Determine version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 for Windows zip
        id: hashes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          ZIP_SHA=$(curl -sSfL "https://github.com/${{ github.repository }}/releases/download/v$VERSION/dbxignore-windows-x86_64.zip" | sha256sum | awk '{print $1}')
          echo "zip_sha=$ZIP_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout scoop-dbxignore
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kiloscheffer/scoop-dbxignore
          token: ${{ secrets.DISTRIBUTION_TOKEN }}
          path: scoop-dbxignore

      - name: Update manifest via jq
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ZIP_SHA: ${{ steps.hashes.outputs.zip_sha }}
        run: |
          cd scoop-dbxignore
          jq --arg ver "$VERSION" --arg zip "$ZIP_SHA" \
            '.version = $ver |
             .architecture."64bit".url = "https://github.com/kiloscheffer/dbxignore/releases/download/v\($ver)/dbxignore-windows-x86_64.zip" |
             .architecture."64bit".hash = $zip |
             .autoupdate.architecture."64bit".url = "https://github.com/kiloscheffer/dbxignore/releases/download/v$version/dbxignore-windows-x86_64.zip"' \
            bucket/dbxignore.json > bucket/dbxignore.json.tmp
          mv bucket/dbxignore.json.tmp bucket/dbxignore.json

      - name: Commit and push
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          cd scoop-dbxignore
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet bucket/dbxignore.json; then
            echo "scoop manifest already at $VERSION; nothing to push"
          else
            git add bucket/dbxignore.json
            git commit -m "chore: bump manifest to dbxignore $VERSION"
            git push
          fi

  publish-homebrew:
    # Auto-bump the kiloscheffer/homebrew-dbxignore tap formula to the
    # newly-released version. Updates URL + sha256 for both macOS Mach-O
    # and Linux x86_64 tar.gz binaries via inline Python regex.
    needs: [classify-tag, publish-github]
    if: |
      startsWith(github.ref, 'refs/tags/')
      && needs.classify-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Determine version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256s for macOS + Linux binaries
        id: hashes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          MACOS_SHA=$(curl -sSfL "https://github.com/${{ github.repository }}/releases/download/v$VERSION/dbxignore-macos-arm64.tar.gz" | sha256sum | awk '{print $1}')
          LINUX_SHA=$(curl -sSfL "https://github.com/${{ github.repository }}/releases/download/v$VERSION/dbxignore-linux-x86_64.tar.gz" | sha256sum | awk '{print $1}')
          echo "macos_sha=$MACOS_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$LINUX_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-dbxignore
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kiloscheffer/homebrew-dbxignore
          token: ${{ secrets.DISTRIBUTION_TOKEN }}
          path: homebrew-dbxignore

      - name: Update formula
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          MACOS_SHA: ${{ steps.hashes.outputs.macos_sha }}
          LINUX_SHA: ${{ steps.hashes.outputs.linux_sha }}
        run: |
          cd homebrew-dbxignore
          python3 <<'PYEOF'
          import os, re
          version = os.environ['VERSION']
          macos_sha = os.environ['MACOS_SHA']
          linux_sha = os.environ['LINUX_SHA']
          with open('Formula/dbxignore.rb') as f:
              content = f.read()
          content = re.sub(r'^  version "[^"]*"', f'  version "{version}"', content, count=1, flags=re.M)
          content = re.sub(
              r'url "https://github\.com/kiloscheffer/dbxignore/releases/download/v[^"]+/dbxignore-macos-arm64\.tar\.gz"\n(\s+)sha256 "[a-f0-9]+"',
              f'url "https://github.com/kiloscheffer/dbxignore/releases/download/v{version}/dbxignore-macos-arm64.tar.gz"\n\\1sha256 "{macos_sha}"',
              content,
          )
          content = re.sub(
              r'url "https://github\.com/kiloscheffer/dbxignore/releases/download/v[^"]+/dbxignore-linux-x86_64\.tar\.gz"\n(\s+)sha256 "[a-f0-9]+"',
              f'url "https://github.com/kiloscheffer/dbxignore/releases/download/v{version}/dbxignore-linux-x86_64.tar.gz"\n\\1sha256 "{linux_sha}"',
              content,
          )
          content = re.sub(r'assert_match "[^"]+"', f'assert_match "{version}"', content, count=1)
          with open('Formula/dbxignore.rb', 'w') as f:
              f.write(content)
          PYEOF

      - name: Commit and push
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          cd homebrew-dbxignore
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/dbxignore.rb; then
            echo "homebrew formula already at $VERSION; nothing to push"
          else
            git add Formula/dbxignore.rb
            git commit -m "chore: bump formula to dbxignore $VERSION"
            git push
          fi

  publish-winget:
    # Auto-submit a winget-pkgs PR for the new release. Uses the
    # kiloscheffer/winget-pkgs fork (auto-created on first wingetcreate
    # submit). DISTRIBUTION_TOKEN PAT scopes Contents + Pull requests
    # on the fork. Action runs on ubuntu-latest (komac is cross-platform).
    #
    # The submitted artifact is `dbxignore-setup.exe`, an Inno Setup
    # installer. winget-releaser/komac auto-detects `InstallerType: inno`
    # from the binary; winget's built-in Inno silent switches cover
    # `winget install kiloscheffer.dbxignore --silent` without a
    # manifest `InstallerSwitches` block.
    #
    # winget-pkgs accepts each version's manifest independently, so
    # changing the installer type from the previous `zip` to `inno`
    # flows through as the next version's manifest with no re-bootstrap.
    #
    # First-submission limitation: the winget-releaser action checks the
    # package path exists in microsoft/winget-pkgs master before submitting.
    # The initial submission for kiloscheffer.dbxignore must be done
    # manually via `wingetcreate submit` (as was done for the 1.0.2 PR).
    # Once that PR merges, every subsequent release's publish-winget runs
    # cleanly. Future re-occurrences of this (e.g. a new package added to
    # this repo) would require the same one-time manual bootstrap.
    needs: [classify-tag, publish-github]
    if: |
      startsWith(github.ref, 'refs/tags/')
      && needs.classify-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: kiloscheffer.dbxignore
          installers-regex: '^dbxignore-setup\.exe$'
          release-tag: ${{ github.ref_name }}
          token: ${{ secrets.DISTRIBUTION_TOKEN }}
