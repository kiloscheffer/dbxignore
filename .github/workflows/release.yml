name: release

on:
  push:
    tags: ['v*']
  # Manual dispatch lets us dry-run the build without cutting a tag, so
  # a workflow change can be validated before the real release. The
  # Publish step is gated on the ref being a tag, so dispatch runs build
  # the artifacts but don't create a Release object.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync --all-extras

      - name: Build wheel + sdist
        run: uv build

      - name: Build Windows binaries
        # pyinstaller is a build-only tool, not a runtime or dev dep — install
        # ephemerally for this run rather than declaring it in pyproject.toml.
        run: uv run --with pyinstaller pyinstaller pyinstaller/dropboxignore.spec

      - name: Publish GitHub Release
        # Only publish on real tag pushes; dispatch runs skip this step.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/dropboxignore.exe
            dist/dropboxignored.exe
          generate_release_notes: true
