name: test

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new commit lands on the same ref. Saves
# Windows-runner minutes (10x cost multiplier vs Linux) during fast push
# iteration on a PR. `github.ref` is the PR merge ref for pull_request
# events and the branch ref for push events, so push-to-main and PR runs
# group independently.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Sync deps
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy .

      - name: Unit tests (cross-platform)
        run: uv run python -m pytest -m "not windows_only and not linux_only and not macos_only" -v

      - name: Windows-only integration tests
        if: runner.os == 'Windows'
        run: uv run python -m pytest -m windows_only -v

      - name: Linux-only integration tests
        if: runner.os == 'Linux'
        run: uv run python -m pytest -m linux_only -v

      - name: macOS-only integration tests
        if: runner.os == 'macOS'
        run: uv run python -m pytest -m macos_only -v
