name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Sync deps
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy .

      - name: Unit tests (cross-platform)
        run: uv run pytest -m "not windows_only and not linux_only and not macos_only" -v

      - name: Windows-only integration tests
        if: runner.os == 'Windows'
        run: uv run pytest -m windows_only -v

      - name: Linux-only integration tests
        if: runner.os == 'Linux'
        run: uv run pytest -m linux_only -v

      - name: macOS-only integration tests
        if: runner.os == 'macOS'
        run: uv run pytest -m macos_only -v
