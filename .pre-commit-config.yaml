# Local enforcement of the rules in cchk.toml. Install once per clone:
#   uv tool install pre-commit
#   pre-commit install --hook-type commit-msg --hook-type pre-push
# After that, `git commit` and `git push` run these checks automatically.
# CI re-runs them via commit-check-action, so local install is a convenience,
# not a merge gate — see CLAUDE.md "Git workflow".

repos:
  - repo: https://github.com/commit-check/commit-check
    rev: v2.6.0
    hooks:
      - id: check-message
        stages: [commit-msg]
      - id: check-branch
        stages: [pre-push]
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false